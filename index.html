<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MCPE Packs Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0d0d0d;
color:white;
}

.header{
text-align:center;
padding:20px;
background:#111;
}

.search{
text-align:center;
padding:10px;
}

input{
width:90%;
max-width:400px;
padding:10px;
border-radius:10px;
border:none;
outline:none;
}

.cat{
padding:12px;
font-size:20px;
color:#00e676;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
padding:10px;
}

.card{
background:#1a1a1a;
border-radius:10px;
overflow:hidden;
border:1px solid #333;
text-align:center;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card h3{
font-size:14px;
margin:5px;
}

.card button{
width:100%;
padding:8px;
background:#00c853;
border:none;
color:white;
font-weight:bold;
cursor:pointer;
}

.counter{
font-size:12px;
color:#aaa;
padding-bottom:5px;
}
</style>
</head>

<body>

<div class="header">
<h1>🔥 MCPE Packs Hub</h1>
</div>

<div class="search">
<input id="search" placeholder="Search packs...">
</div>

<div id="app"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAnAJG_TFMX3CbTbdo3MD3KHk8rK8TxIMY",
  authDomain: "mcpackss-62645.firebaseapp.com",
  projectId: "mcpackss-62645",
  storageBucket: "mcpackss-62645.firebasestorage.app",
  messagingSenderId: "770814437665",
  appId: "1:770814437665:web:bb3958093106809ed67660"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* FULL PACK LIST */
const packs = [
{id:"zenfps",name:"Zen FPS Pro",file:"ZenFPS_PRO.mcpack",img:"ZenFPS_PRO.png",cat:"FPS"},
{id:"optifire",name:"Optifire",file:"Optifire.mcpack",img:"Optifire.png",cat:"FPS"},
{id:"sodiumx",name:"Sodium X",file:"SodiumX.mcpack",img:"SodiumX.png",cat:"FPS"},
{id:"asteroid",name:"Asteroid Client",file:"AsteroidClient.mcpack",img:"AsteroidClient.png",cat:"FPS"},

{id:"zenpvp",name:"Zen PvP Pack",file:"ZenPVPPack.mcpack",img:"ZenPVPPack.png",cat:"PvP"},
{id:"venom",name:"Venom PvP",file:"VenomPVP.mcpack",img:"VenomPVP.png",cat:"PvP"},
{id:"lyro",name:"Lyro PvP Ultimate",file:"LyroPVPUltimate.mcpack",img:"LyroPVPUltimate.png",cat:"PvP"},
{id:"zenutil",name:"Zen Utility HUD",file:"ZenUtilityHUD.mcpack",img:"ZenUtilityHUD.png",cat:"PvP"},

{id:"actions",name:"Actions & Stuff",file:"Actions-and-Stuff.mcpack",img:"Actions-and-Stuff.png",cat:"Actions"},

{id:"bedrockui",name:"Bedrock UI",file:"BedrockUI.mcpack",img:"BedrockUI.png",cat:"UI"},
{id:"vdx",name:"VDX Desktop UI",file:"VDXDesktopUI.mcpack",img:"VDXDesktopUI.png",cat:"UI"},
{id:"deesse",name:"Déesse UI",file:"DéesseUI.mcpack",img:"DéesseUI.png",cat:"UI"},
{id:"ultra",name:"Ultramarine Nightfall",file:"Ultramarine_Nightfall.mcpack",img:"Ultramarine_Nightfall.png",cat:"UI"},

{id:"yummy",name:"Yummysheep Shader",file:"YummysheepShader.mcpack",img:"YummysheepShader.png",cat:"Shaders"},
{id:"newb",name:"NewbX Legacy",file:"NewbXLegacy.mcpack",img:"NewbXLegacy.png",cat:"Shaders"},
{id:"nr",name:"NR Shader",file:"NRShader.mcpack",img:"NRShader.png",cat:"Shaders"},
{id:"rg",name:"RG Shader",file:"RGShader.mcpack",img:"RGShader.png",cat:"Shaders"},

{id:"backpacks",name:"Backpacks",file:"Backpacks.mcaddon",img:"Backpacks.png",cat:"Survival"},
{id:"dynamic",name:"Dynamic Lightning",file:"DynamicLightning.mcaddon",img:"DynamicLightning.png",cat:"Survival"},
{id:"furni",name:"Furnicraft",file:"FURNICRAFT.mcpack",img:"FURNICRAFT.png",cat:"Survival"},
{id:"naturalist",name:"Naturalist",file:"Naturalist.mcaddon",img:"Naturalist.png",cat:"Survival"},

{id:"jungle",name:"Jungle House",file:"JungleSurvivalHouse.mcworld",img:"JungleSurvivalHouse.png",cat:"Houses"},
{id:"medieval",name:"Medieval House",file:"MedievalHouse.mcworld",img:"MedievalHouse.png",cat:"Houses"},
{id:"spruce",name:"Spruce House",file:"SpruceSurvivalHouse.mcworld",img:"SpruceSurvivalHouse.png",cat:"Houses"},
{id:"starter",name:"Starter House",file:"StarterHouseSurvival.mcworld",img:"StarterHouseSurvival.png",cat:"Houses"}
];

/* GET COUNT */
function getCount(id, cb){
db.collection("downloads").doc(id).get().then(doc=>{
if(!doc.exists){
db.collection("downloads").doc(id).set({count:0});
cb(0);
}else{
cb(doc.data().count);
}
});
}

/* UPDATE UI */
function updateCount(id,c){
let el=document.getElementById("c_"+id);
if(el) el.innerText="Downloads: "+c;
}

/* 🔥 FIXED DOWNLOAD (PYTHON-LIKE BEHAVIOR) */
function download(id, file){

const ref = db.collection("downloads").doc(id);

/* increment FIRST */
ref.get().then(doc=>{
let c = doc.exists ? doc.data().count : 0;
ref.set({count:c+1});
updateCount(id,c+1);
});

/* force fresh download every click */
setTimeout(()=>{

const url =
"./" + file +
"?v=" + Date.now() +
"&r=" + Math.random();

const a = document.createElement("a");
a.href = url;
a.download = file;
a.style.display = "none";

document.body.appendChild(a);
a.click();
document.body.removeChild(a);

}, 100);

}

/* RENDER */
function render(){

let app=document.getElementById("app");
let grouped={};

packs.forEach(p=>{
if(!grouped[p.cat]) grouped[p.cat]=[];
grouped[p.cat].push(p);
});

let html="";

for(let cat in grouped){
html+=`<div class="cat">${cat}</div><div class="grid">`;

grouped[cat].forEach(p=>{
html+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<div class="counter" id="c_${p.id}">Loading...</div>
<button onclick="download('${p.id}','${p.file}')">Download</button>
</div>`;

getCount(p.id,c=>{
updateCount(p.id,c);
});
});

html+="</div>";
}

app.innerHTML=html;
}

render();

/* SEARCH */
document.getElementById("search").addEventListener("input",e=>{
let v=e.target.value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?"block":"none";
});
});
</script>

</body>
</html>
