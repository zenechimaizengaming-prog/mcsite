];  
  
let currentFilter="ALL";  
function filterCat(c){  
currentFilter=c;  
render();  
}  
  
let counts={};  
  
db.collection("downloads").onSnapshot(snapshot=>{  
snapshot.forEach(doc=>{  
counts[doc.id]=doc.data().count||0;  
});  
render();  
renderRanking();  
});  
  
function download(id,file){  
let newCount=(counts[id]||0)+1;  
  
db.collection("downloads").doc(id).set({  
count:newCount  
});  
  
setTimeout(()=>{  
const a=document.createElement("a");  
a.href="./"+file+"?v="+Date.now();  
a.download=file;  
document.body.appendChild(a);  
a.click();  
document.body.removeChild(a);  
},100);  
}  
  
function render(){  
  
let app=document.getElementById("app");  
let grouped={};  
  
packs.forEach(p=>{  
  
if(currentFilter!="ALL" && p.cat!=currentFilter) return;  
  
if(!grouped[p.cat]) grouped[p.cat]=[];  
  
grouped[p.cat].push(p);  
  
});  
  
let html="";  
  
for(let cat in grouped){  
  
html+=`<div class="cat">${cat}</div><div class="grid">`;  
  
grouped[cat].forEach(p=>{  
  
html+=`  
<div class="card">  
  
${p.new ? `<div class="newbadge">NEW</div>` : ``}  
  
<img src="${p.img}">  
  
<h3>${p.name}</h3>  
  
<p class="desc">${p.desc}</p>  
  
<div class="counter">🔥 ${counts[p.id]||0} Downloads</div>  
  
<button onclick="download('${p.id}','${p.file}')">  
Download  
</button>  
  
</div>  
`;  
  
});  
  
html+="</div>";  
}  
  
app.innerHTML=html;  
}  
  
function renderRanking(){  
  
let sorted=Object.entries(counts)  
.sort((a,b)=>b[1]-a[1])  
.slice(0,10);  
  
let html="<div class='grid'>";  
  
sorted.forEach(([id,c],i)=>{  
  
let p=packs.find(x=>x.id===id);  
  
if(!p) return;  
  
html+=`  
<div class="card">  
  
<div class="rank">#${i+1}</div>  
  
<img src="${p.img}">  
  
<h3>${p.name}</h3>  
  
<p class="desc">${p.desc}</p>  
  
<div class="counter">🔥 ${c} Downloads</div>  
  
<button onclick="download('${p.id}','${p.file}')">  
Download  
</button>  
  
</div>  
`;  
  
});  
  
html+="</div>";  
  
document.getElementById("top").innerHTML=html;  
}  
  
render();  
renderRanking();  
  
document.getElementById("search").addEventListener("input", e => {  
  let v = e.target.value.toLowerCase();  
  
  document.querySelectorAll(".card").forEach(c => {  
    c.style.display = c.innerText.toLowerCase().includes(v) ? "block" : "none";  
  });  
});
</script>
