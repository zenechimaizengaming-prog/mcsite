<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MCPE Packs Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#0d0d0d,#0a0a0a);
color:white;
}

.header{
text-align:center;
padding:25px;
background:linear-gradient(90deg,#00c853,#00b0ff);
font-size:22px;
font-weight:bold;
}

.info{
margin:10px;
padding:10px;
background:#1b5e20;
border-radius:10px;
text-align:center;
font-size:13px;
}

.search{
text-align:center;
padding:10px;
}

input{
width:90%;
max-width:400px;
padding:12px;
border-radius:12px;
border:none;
outline:none;
}

.filters{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
padding:10px;
}

.filters button{
padding:8px 12px;
border:none;
border-radius:20px;
background:#1f1f1f;
color:white;
cursor:pointer;
font-size:12px;
}

.filters button:hover{
background:#00c853;
}

.cat{
padding:12px;
font-size:18px;
color:#00e676;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
padding:10px;
}

.card{
background:#1a1a1a;
border-radius:12px;
overflow:hidden;
border:1px solid #333;
text-align:center;
position:relative;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card h3{
font-size:14px;
margin:5px;
}

.desc{
font-size:12px;
color:#bbb;
padding:0 8px 8px;
min-height:40px;
}

.counter{
font-size:12px;
color:#aaa;
padding-bottom:5px;
}

.card button{
width:100%;
padding:8px;
background:#00c853;
border:none;
color:white;
font-weight:bold;
cursor:pointer;
}

.badge{
position:absolute;
top:8px;
left:8px;
background:#ff3d00;
color:white;
font-size:10px;
padding:4px 6px;
border-radius:6px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">🔥 MCPE Packs Hub</div>

<div class="info">
🚀 Live Web App — updates automatically from GitHub<br>
No reinstall needed. Everything updates instantly.
</div>

<div class="search">
<input id="search" placeholder="Search packs...">
</div>

<div class="filters">
<button onclick="filterCat('ALL')">ALL</button>
<button onclick="filterCat('FPS')">FPS</button>
<button onclick="filterCat('PvP')">PvP</button>
<button onclick="filterCat('Shaders')">Shaders</button>
<button onclick="filterCat('Survival')">Survival</button>
<button onclick="filterCat('Houses')">Houses</button>
<button onclick="filterCat('UI')">UI</button>
<button onclick="filterCat('Actions')">Actions</button>
</div>

<div class="cat">🔥 Trending Packs</div>
<div id="top"></div>

<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyAnAJG_TFMX3CbTbdo3MD3KHk8rK8TxIMY",
authDomain: "mcpackss-62645.firebaseapp.com",
projectId: "mcpackss-62645",
storageBucket: "mcpackss-62645.firebasestorage.app",
messagingSenderId: "770814437665",
appId: "1:770814437665:web:bb3958093106809ed67660"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ================= PACK LIST ================= */
const packs = [
{id:"zenfps",name:"Zen FPS Pro",desc:"Boost FPS and reduce lag spikes for smoother Minecraft gameplay and better performance stability.",file:"ZenFPS_PRO.mcpack",img:"ZenFPS_PRO.png",cat:"FPS",added:1710000000000},
{id:"optifire",name:"Optifire",desc:"Improves visual clarity and optimizes performance for smoother gameplay on low and mid devices.",file:"Optifire.mcpack",img:"Optifire.png",cat:"FPS",added:1710000000000},
{id:"sodiumx",name:"Sodium X",desc:"Lightweight optimization pack that improves rendering efficiency and reduces lag during gameplay.",file:"SodiumX.mcpack",img:"SodiumX.png",cat:"FPS",added:1710000000000},
{id:"asteroid",name:"Asteroid Client",desc:"Performance utility pack designed to enhance responsiveness and overall Minecraft stability.",file:"AsteroidClient.mcpack",img:"AsteroidClient.png",cat:"FPS",added:1710000000000},

{id:"zenpvp",name:"Zen PvP Pack",desc:"Clean PvP textures designed for better visibility, faster reaction time, and competitive advantage.",file:"ZenPVPPack.mcpack",img:"ZenPVPPack.png",cat:"PvP",added:1710000000000},
{id:"venom",name:"Venom PvP",desc:"Dark themed PvP pack that enhances contrast and enemy visibility during combat.",file:"VenomPVP.mcpack",img:"VenomPVP.png",cat:"PvP",added:1710000000000},
{id:"lyro",name:"Lyro PvP Ultimate",desc:"Competitive PvP pack built for clarity, hit detection visibility, and smooth combat experience.",file:"LyroPVPUltimate.mcpack",img:"LyroPVPUltimate.png",cat:"PvP",added:1710000000000},
{id:"zenutil",name:"Zen Utility HUD",desc:"Improved HUD system that enhances player awareness and simplifies interface layout.",file:"ZenUtilityHUD.mcpack",img:"ZenUtilityHUD.png",cat:"PvP",added:1710000000000},

{id:"actions",name:"Actions & Stuff",desc:"Adds smooth animations and enhanced visual effects for more dynamic gameplay experience.",file:"Actions-and-Stuff.mcpack",img:"Actions-and-Stuff.png",cat:"Actions",added:1710000000000},

{id:"bedrockui",name:"Bedrock UI",desc:"Modern Minecraft interface redesign with improved layout, readability, and navigation.",file:"BedrockUI.mcpack",img:"BedrockUI.png",cat:"UI",added:1710000000000},
{id:"vdx",name:"VDX Desktop UI",desc:"PC-style interface bringing desktop-like experience to Minecraft Bedrock mobile.",file:"VDXDesktopUI.mcpack",img:"VDXDesktopUI.png",cat:"UI",added:1710000000000},
{id:"deesse",name:"Déesse UI",desc:"Elegant UI theme with smooth visuals and modern design aesthetics.",file:"DéesseUI.mcpack",img:"DéesseUI.png",cat:"UI",added:1710000000000},
{id:"ultra",name:"Ultramarine Nightfall",desc:"Dark immersive UI theme designed for stylish and focused gameplay.",file:"Ultramarine_Nightfall.mcpack",img:"Ultramarine_Nightfall.png",cat:"UI",added:1710000000000},

{id:"hotbar",name:"Hotbar Slot Button",desc:"Improves mobile hotbar controls for faster and smoother slot switching experience.",file:"HotbarSlotButton.mcpack",img:"HotbarSlotButton.png",cat:"UI",added:Date.now()},

{id:"yummy",name:"Yummysheep Shader",desc:"Realistic shader improving lighting, shadows, and water effects for immersive visuals.",file:"YummysheepShader.mcpack",img:"YummysheepShader.png",cat:"Shaders",added:1710000000000},
{id:"newb",name:"NewbX Legacy",desc:"Balanced shader combining performance optimization with enhanced world visuals.",file:"NewbXLegacy.mcpack",img:"NewbXLegacy.png",cat:"Shaders",added:1710000000000},
{id:"nr",name:"NR Shader",desc:"Smooth lighting shader enhancing colors, shadows, and world atmosphere.",file:"NRShader.mcpack",img:"NRShader.png",cat:"Shaders",added:1710000000000},
{id:"rg",name:"RG Shader",desc:"Vibrant shader pack increasing color intensity and visual realism.",file:"RGShader.mcpack",img:"RGShader.png",cat:"Shaders",added:1710000000000},

{id:"backpacks",name:"Backpacks",desc:"Adds portable storage backpacks for expanded inventory in survival gameplay.",file:"Backpacks.mcaddon",img:"Backpacks.png",cat:"Survival",added:1710000000000},
{id:"dynamic",name:"Dynamic Lightning",desc:"Enhances environmental lighting for more realistic survival atmosphere.",file:"DynamicLightning.mcaddon",img:"DynamicLightning.png",cat:"Survival",added:1710000000000},
{id:"furni",name:"Furnicraft",desc:"Furniture addon adding decorative and usable items for creative building.",file:"FURNICRAFT.mcpack",img:"FURNICRAFT.png",cat:"Survival",added:1710000000000},
{id:"naturalist",name:"Naturalist",desc:"Adds wildlife and natural ecosystem features for a more alive Minecraft world.",file:"Naturalist.mcaddon",img:"Naturalist.png",cat:"Survival",added:1710000000000},

{id:"jungle",name:"Jungle House",desc:"Survival world featuring a detailed jungle house for exploration gameplay.",file:"JungleSurvivalHouse.mcworld",img:"JungleSurvivalHouse.png",cat:"Houses",added:1710000000000},
{id:"medieval",name:"Medieval House",desc:"Beautiful medieval survival house world with detailed architecture.",file:"MedievalHouse.mcworld",img:"MedievalHouse.png",cat:"Houses",added:1710000000000},
{id:"spruce",name:"Spruce House",desc:"Cozy survival house located in a peaceful spruce forest environment.",file:"SpruceSurvivalHouse.mcworld",img:"SpruceSurvivalHouse.png",cat:"Houses",added:1710000000000},
{id:"starter",name:"Starter House",desc:"Beginner friendly survival house designed for early game players.",file:"StarterHouseSurvival.mcworld",img:"StarterHouseSurvival.png",cat:"Houses",added:1710000000000}
];

/* FILTER */
let currentFilter="ALL";
function filterCat(c){currentFilter=c;render();}

/* COUNTS */
let counts={};

async function loadCounts(){
const snap=await db.collection("downloads").get();
snap.forEach(d=>counts[d.id]=d.data().count||0);
}

/* BADGE (NEW AUTO 7 DAYS) */
function getBadge(p){
const SEVEN_DAYS = 7*24*60*60*1000;
if(p.added && Date.now()-p.added < SEVEN_DAYS){
return "NEW";
}
return "";
}

/* DOWNLOAD */
function download(id,file){
counts[id]=(counts[id]||0)+1;
db.collection("downloads").doc(id).set({count:counts[id]});

setTimeout(()=>{
const a=document.createElement("a");
a.href="./"+file+"?v="+Date.now();
a.download=file;
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
renderTop();
},100);
}

/* RENDER */
function render(){
let app=document.getElementById("app");
let grouped={};

packs.forEach(p=>{
if(currentFilter!="ALL" && p.cat!=currentFilter) return;
if(!grouped[p.cat]) grouped[p.cat]=[];
grouped[p.cat].push(p);
});

let html="";
for(let cat in grouped){
html+=`<div class="cat">${cat}</div><div class="grid">`;

grouped[cat].forEach(p=>{
html+=`
<div class="card">
${getBadge(p)?`<div class="badge">NEW</div>`:""}
<img src="${p.img}">
<h3>${p.name}</h3>
<p class="desc">${p.desc}</p>
<div class="counter">🔥 ${counts[p.id]||0} downloads</div>
<button onclick="download('${p.id}','${p.file}')">Download</button>
</div>`;
});

html+="</div>";
}

app.innerHTML=html;
}

/* TRENDING */
function renderTop(){
let top=Object.entries(counts)
.sort((a,b)=>b[1]-a[1])
.slice(0,5);

let html="<div class='grid'>";

top.forEach(([id,c])=>{
let p=packs.find(x=>x.id===id);
if(!p)return;

html+=`
<div class="card">
${getBadge(p)?`<div class="badge">NEW</div>`:""}
<img src="${p.img}">
<h3>${p.name}</h3>
<p class="desc">${p.desc}</p>
<div class="counter">🔥 ${c}</div>
<button onclick="download('${p.id}','${p.file}')">Download</button>
</div>`;
});

html+="</div>";
document.getElementById("top").innerHTML=html;
}

/* SEARCH */
document.getElementById("search").addEventListener("input",e=>{
let v=e.target.value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?"block":"none";
});
});

/* INIT */
async function init(){
await loadCounts();
render();
renderTop();
}
init();

</script>

</body>
</html>
